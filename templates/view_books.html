<!DOCTYPE html>
<html>
<head>

<title>View Books</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Book List</h1>

<table>

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Category</th>
    <th>Price</th>
</tr>

{% for book in books %}

<tr>

<td>{{ book[0] }}</td>
<td>{{ book[1] }}</td>
<td>{{ book[2] }}</td>
<td>{{ book[3] }}</td>
<td>{{ book[4] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/" class="menu-btn">
Back Home
</a>

</div>
<footer class="footer">
    &copy; www.anudip.org | All Rights Reserved
</footer>
</body>
</html>
